version: "3.9"

services:
  neo4j:
    image: neo4j:5.15-community
    environment:
      NEO4J_AUTH: neo4j/hiveresearch
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD", "neo4j", "status"]
      interval: 10s
      retries: 5
    networks: [hive_internal]

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: hive
      POSTGRES_USER: hive
      POSTGRES_PASSWORD: hiveresearch
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hive"]
      interval: 5s
      retries: 5
    networks: [hive_internal]

  redis:
    image: redis:7-alpine
    networks: [hive_internal]

  coordinator:
    build:
      context: .
      dockerfile: coordinator/Dockerfile
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: hiveresearch
      DATABASE_URL: postgresql://hive:hiveresearch@postgres:5432/hive
      REDIS_URL: redis://redis:6379
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      BRAVE_API_KEY: ${BRAVE_API_KEY}
      HIVE_API_KEY: ${HIVE_API_KEY}
    depends_on:
      neo4j: { condition: service_healthy }
      postgres: { condition: service_healthy }
    networks: [hive_internal]

  workers:
    build:
      context: .
      dockerfile: workers/Dockerfile
    environment:
      COORDINATOR_URL: http://coordinator:8000
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      BRAVE_API_KEY: ${BRAVE_API_KEY}
    depends_on: [coordinator]
    networks: [hive_internal]
    deploy:
      replicas: 2

  mcp:
    build:
      context: .
      dockerfile: coordinator/Dockerfile
    command: hive-mcp --transport sse --port 8001
    environment:
      COORDINATOR_URL: http://coordinator:8000
      HIVE_API_KEY: ${HIVE_API_KEY}
    ports:
      - "8001:8001"
    networks: [hive_internal, hive_external]

networks:
  hive_internal:
    driver: bridge
  hive_external:
    driver: bridge

volumes:
  neo4j_data:
  postgres_data:
