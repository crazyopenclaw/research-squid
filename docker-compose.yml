services:
  neo4j:
    image: neo4j:5.15-community
    environment:
      NEO4J_AUTH: neo4j/researchsquid
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD", "neo4j", "status"]
      interval: 10s
      retries: 5
    networks: [squid_internal]

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: squid
      POSTGRES_USER: squid
      POSTGRES_PASSWORD: researchsquid
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U squid"]
      interval: 5s
      retries: 5
    networks: [squid_internal]

networks:
  squid_internal:
    driver: bridge

volumes:
  neo4j_data:
  postgres_data:
