version: "3.9"

services:
  neo4j:
    ports:
      - "7474:7474"
      - "7687:7687"

  postgres:
    ports:
      - "5432:5432"

  coordinator:
    volumes:
      - ./hive:/app/hive
    command: uvicorn hive.coordinator.app:app --host 0.0.0.0 --port 8000 --reload

  workers:
    volumes:
      - ./hive:/app/hive
